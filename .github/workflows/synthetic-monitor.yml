name: synthetic-monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  synthetic-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run synthetic probe
        run: npm run synthetic:probe

      - name: Upload synthetic report
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-probe-${{ github.run_number }}
          path: .tmp/synthetic/latest.json
          retention-days: 14
          if-no-files-found: error
