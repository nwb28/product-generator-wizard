name: branch-protection-governance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  verify-main-protection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch main branch protection
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .tmp
          gh api repos/${{ github.repository }}/branches/main/protection > .tmp/main-branch-protection.json

      - name: Verify required status checks
        id: verify_policy
        continue-on-error: true
        run: |
          node tools/check-branch-protection.mjs \
            --protection .tmp/main-branch-protection.json \
            --required bootstrap,contract-gate,preview-contract-gate,security-scan,release-evidence-bundle

      - name: Open drift issue when policy check fails
        if: steps.verify_policy.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Governance] Branch protection drift detected on main';
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`
            });
            if ((existing.data.items ?? []).length > 0) {
              core.info('Existing open drift issue found; skipping new issue creation.');
              return;
            }
            const body = [
              'Branch protection policy check failed.',
              '',
              'Workflow: branch-protection-governance',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Required checks baseline:',
              '- bootstrap',
              '- contract-gate',
              '- preview-contract-gate',
              '- security-scan',
              '- release-evidence-bundle'
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['governance', 'branch-protection']
            });

      - name: Fail workflow on policy drift
        if: steps.verify_policy.outcome == 'failure'
        run: exit 1
