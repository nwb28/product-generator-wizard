name: governance-quarterly-self-test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 1 1,4,7,10 *'

permissions:
  contents: read
  issues: write

jobs:
  governance-self-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare sample retention run payload
        run: |
          mkdir -p .tmp
          cat > .tmp/retention-runs.sample.json <<'JSON'
          {
            "workflow_runs": [
              {
                "id": 1,
                "conclusion": "success",
                "updated_at": "2026-03-10T00:30:00.000Z",
                "html_url": "https://example.test/runs/1"
              }
            ]
          }
          JSON

      - name: Fetch main branch protection
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/branches/main/protection > .tmp/main-branch-protection.json

      - name: Validate secret rotation evidence policy
        run: npm run secrets:rotation:check

      - name: Run governance self-test
        id: self_test
        continue-on-error: true
        run: node tools/governance-self-test.mjs --out .tmp/governance-self-test --protection .tmp/main-branch-protection.json

      - name: Upload self-test report
        uses: actions/upload-artifact@v4
        with:
          name: governance-self-test-${{ github.run_number }}
          path: .tmp/governance-self-test
          retention-days: 30
          if-no-files-found: error

      - name: Open governance issue on failure
        if: steps.self_test.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Governance] Quarterly self-test failure';
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`
            });
            if ((existing.data.items ?? []).length > 0) {
              core.info('Open governance self-test failure issue already exists.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Governance quarterly self-test failed. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['governance']
            });

      - name: Fail workflow when self-test fails
        if: steps.self_test.outcome == 'failure'
        run: exit 1
