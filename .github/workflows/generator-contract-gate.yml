name: generator-contract-gate

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: generator-contract-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build workspace
        run: npm run build

      - name: Run API readiness and contract smoke
        run: npm run smoke:api

      - name: Validate intake (blocking gate)
        run: node tools/generator-cli/dist/index.js validate fixtures/golden/pilot-intake.json

      - name: Run CI check (fails on blocking diagnostics)
        run: node tools/generator-cli/dist/index.js ci-check fixtures/golden/pilot-intake.json

      - name: Generate package in temp workspace
        run: |
          mkdir -p .tmp/generator-output
          node tools/generator-cli/dist/index.js generate fixtures/golden/pilot-intake.json --out .tmp/generator-output

      - name: Run scaffold contract tests
        run: npm test --workspace @pgw/packages-scaffold-templates

      - name: Verify clean tracked tree
        run: node tools/ensure-clean-worktree.mjs

      - name: Verify workflow retention policy conformance
        run: node tools/validate-workflow-retention.mjs --policy config/artifact-retention-policy.json --workflows .github/workflows

      - name: Verify repository layout policy conformance
        run: npm run layout:check

      - name: Verify workflow command references
        run: npm run workflow:check

      - name: Produce diagnostics artifact
        run: |
          node tools/generator-cli/dist/index.js validate fixtures/golden/pilot-intake.json > .tmp/diagnostics.txt

      - name: Upload review document artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-document-${{ github.run_number }}
          path: .tmp/generator-output/review/human-review.md
          retention-days: 30
          if-no-files-found: error

      - name: Upload diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-${{ github.run_number }}
          path: .tmp/diagnostics.txt
          retention-days: 14
          if-no-files-found: error
