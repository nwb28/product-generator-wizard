name: openapi-contract

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate OpenAPI contract
        run: npm run openapi:check

      - name: Validate OpenAPI compatibility baseline
        run: npm run openapi:compat:check
