name: deploy

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      deploy_ref:
        description: Git ref to deploy
        required: true
        default: main
        type: string

permissions:
  contents: read
  actions: read
  attestations: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Release gate checks
        run: npm run release:check

      - name: Resolve latest release evidence run id
        id: release_evidence_run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --workflow release-evidence-bundle.yml --branch "${{ inputs.deploy_ref }}" --status success --limit 1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful release-evidence-bundle run found for ref ${{ inputs.deploy_ref }}."
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download release evidence artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .tmp/release-evidence
          gh run download "${{ steps.release_evidence_run.outputs.run_id }}" -n release-evidence-bundle -D .tmp/release-evidence

      - name: Verify release evidence attestation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify .tmp/release-evidence/release-evidence.json --repo "${{ github.repository }}"

      - name: Environment config validation
        run: npm run config:check
        env:
          WIZARD_AUTH_JWT_SECRET: ${{ secrets.WIZARD_AUTH_JWT_SECRET }}
          WIZARD_AUTH_JWT_ISSUER: ${{ secrets.WIZARD_AUTH_JWT_ISSUER }}
          WIZARD_AUTH_JWT_AUDIENCE: ${{ secrets.WIZARD_AUTH_JWT_AUDIENCE }}
          WIZARD_AUDIT_HMAC_SECRET: ${{ secrets.WIZARD_AUDIT_HMAC_SECRET }}

  deploy:
    runs-on: ubuntu-latest
    needs: preflight
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Deployment approval checkpoint
        run: echo "Preflight passed for ${{ inputs.target_environment }} on ref ${{ inputs.deploy_ref }}."

      - name: Manual deployment step
        run: echo "Hook deployment tooling here (intentionally manual-controlled in MVP)."
