name: deploy

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
      deploy_ref:
        description: Git ref to deploy
        required: true
        default: main
        type: string

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Release gate checks
        run: npm run release:check

      - name: Environment config validation
        run: npm run config:check
        env:
          WIZARD_AUTH_JWT_SECRET: ${{ secrets.WIZARD_AUTH_JWT_SECRET }}
          WIZARD_AUTH_JWT_ISSUER: ${{ secrets.WIZARD_AUTH_JWT_ISSUER }}
          WIZARD_AUTH_JWT_AUDIENCE: ${{ secrets.WIZARD_AUTH_JWT_AUDIENCE }}
          WIZARD_AUDIT_HMAC_SECRET: ${{ secrets.WIZARD_AUDIT_HMAC_SECRET }}

  deploy:
    runs-on: ubuntu-latest
    needs: preflight
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Deployment approval checkpoint
        run: echo "Preflight passed for ${{ inputs.target_environment }} on ref ${{ inputs.deploy_ref }}."

      - name: Manual deployment step
        run: echo "Hook deployment tooling here (intentionally manual-controlled in MVP)."
