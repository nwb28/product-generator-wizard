name: retention-observability

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  issues: write

jobs:
  retention-slo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Evaluate purge workflow freshness
        id: purge_slo
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node tools/check-retention-purge-slo.mjs \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}" \
            --workflow preview-artifact-retention.yml \
            --max-age-hours 26

      - name: Open alert issue when purge SLO fails
        if: steps.purge_slo.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[Ops Alert] Preview artifact purge SLO missed';
            const existing = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open in:title "${title}"`
            });
            if ((existing.data.items ?? []).length > 0) {
              core.info('Open purge SLO issue already exists.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `Retention purge workflow appears stale. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['operations', 'retention']
            });

      - name: Fail when purge SLO is breached
        if: steps.purge_slo.outcome == 'failure'
        run: exit 1
