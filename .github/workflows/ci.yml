name: ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build --if-present
      - run: npm run smoke:api
      - run: npm run smoke:ui
      - run: npm test --if-present
      - run: node tools/validate-workflow-retention.mjs --policy config/artifact-retention-policy.json --workflows .github/workflows
      - run: node tools/ensure-clean-worktree.mjs
