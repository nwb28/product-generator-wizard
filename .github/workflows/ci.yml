name: ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build --if-present
      - run: npm run smoke:api
      - run: npm run smoke:ui
      - run: npm test --if-present
      - run: npm run pr:compliance:check
      - run: node tools/verify-deploy-attestation-path.mjs --workflow .github/workflows/deploy.yml
      - run: node tools/validate-workflow-retention.mjs --policy config/artifact-retention-policy.json --workflows .github/workflows
      - run: npm run audit:schema:check
      - run: npm run rbac:check
      - run: npm run secrets:rotation:check
      - run: npm run openapi:compat:check
      - run: npm run deps:policy:check
      - run: npm run slo:check
      - run: npm run layout:check
      - run: npm run workflow:check
      - run: node tools/ensure-clean-worktree.mjs
