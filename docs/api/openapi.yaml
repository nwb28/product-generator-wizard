openapi: 3.0.3
info:
  title: Product Generator Wizard API
  version: 0.1.0
servers:
  - url: https://api.example.com
paths:
  /authz/wizard-entry:
    get:
      summary: Validate wizard access for current principal
      responses:
        '200':
          description: Principal is authorized
        '403':
          description: Principal is not authorized
        '429':
          description: Rate limited
  /validate:
    post:
      summary: Validate intake payload against contract rules
      responses:
        '200':
          description: Intake valid
        '400':
          description: Intake invalid
        '429':
          description: Rate limited
  /compile:
    post:
      summary: Compile intake payload into manifest
      responses:
        '200':
          description: Manifest generated
        '400':
          description: Compile failure
        '403':
          description: Not authorized
        '429':
          description: Rate limited
  /generate:
    post:
      summary: Generate deterministic scaffold package
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Generation success
        '400':
          description: Invalid payload
        '403':
          description: Not authorized
        '409':
          description: Idempotency conflict or in-flight operation
        '429':
          description: Rate limited
  /review-document:
    post:
      summary: Generate human review document
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Review document generated
        '400':
          description: Invalid payload
        '403':
          description: Not authorized
        '409':
          description: Idempotency conflict or in-flight operation
        '429':
          description: Rate limited
